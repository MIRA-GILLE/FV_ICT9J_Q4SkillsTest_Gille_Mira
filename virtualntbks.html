<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Notebooks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
        }

        .sidebar {
            width: 60px;
            background-color: #0a192f;
            padding: 10px;
            color: white;
            transition: width 0.3s;
        }

        .sidebar.expanded {
            width: 250px;
            padding: 20px;
        }

        .toggle-btn {
            margin-bottom: 15px;
            color: white;
            border: 1px solid white;
            width: 40px;
        }

        .sidebar h5 {
            display: none;
        }

        .sidebar.expanded h5 {
            display: block;
        }

        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 0;
        }

        .sidebar.expanded a {
            justify-content: flex-start;
        }

        .sidebar a:hover {
            color: white;
        }

        .sidebar i {
            font-size: 20px;
        }

        .sidebar.expanded i {
            margin-right: 10px;
        }

        .sidebar .label {
            display: none;
        }

        .sidebar.expanded .label {
            display: inline;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background-color: white !important;
            border-bottom: 1px solid #ddd;
        }

        .navbar .navbar-brand {
            color: #0a192f !important;
            font-weight: bold;
        }

        .navbar .btn {
            color: #0a192f !important;
            border: 1px solid #0a192f !important;
        }

        .navbar .btn:hover {
            background-color: #0a192f;
            color: white !important;
        }

        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .box {
            background: #f0f0f0;
            border-radius: 15px;
            padding: 60px 20px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            font-size: 18px;
            font-weight: bold;
        }

        .box:hover {
            filter: brightness(1.3);
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="sidebar">
    <button class="toggle-btn btn btn-sm" id="sidebartoggle">☰</button>

    <h5>Menu</h5>

    <a href="#"><i class="fas fa-home"></i><span class="label">Home</span></a>
    <a href="#"><i class="fas fa-book"></i><span class="label">Notebooks</span></a>
    <a href="#"><i class="fas fa-calendar"></i><span class="label">Schedule</span></a>
    <a href="#"><i class="fas fa-cog"></i><span class="label">Settings</span></a>
</div>

<div class="main">

    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">OBMC Virtual Notebook</a>
            <a href="/Users/mira/Documents/GitHub/FV_ICT9J_Q4SkillsTest_Gille_Mira/index.html" class="btn btn-sm ms-auto">Logout</a>
        </div>
    </nav>

    <div class="content">
        <h1>Your Notebooks</h1>

        <div class="grid">
            <div class="box" style="background: #e07070;">ENGLISH</div>
            <div class="box" style="background: #7fb3f0;">MATHEMATICS</div>
            <div class="box" style="background: #66d99f;">SCIENCE</div>
            <div class="box" style="background: #e8b366;">SOCIAL STUDIES</div>
            <div class="box" style="background: #61c3de;">MUSIC & ARTS</div>
            <div class="box" style="background: #de6eb9;">FILIPINO</div>
            <div class="box" style="background: #6393d1;">VALUES EDUCATION</div>
            <div class="box" style="background: #d4aff2;">ICT</div>
            <div class="box" style="background: #a5a5a5;">LEADERSHIP TRAINING</div>
            <div class="box" style="background: hsl(54, 80%, 60%);">PEH</div>
            <div class="box" style="background: #c55e9b;">TLE</div>
            <div class="box" style="background: #70a5d2;">HOMEROOM</div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const sidebarToggle = document.getElementById('sidebartoggle');
    const sidebar = document.querySelector('.sidebar');

    sidebarToggle.addEventListener('click', function() {
        sidebar.classList.toggle('expanded');
    });
</script>

</body>
</html>
