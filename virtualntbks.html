<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Notebooks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }
        .navbar {
            flex-shrink: 0;
        }
        .sidebar {
            width: 250px;
            background-color: #212529;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            z-index: 1000;
        }
        .sidebar.collapsed {
            transform: translateX(-100%);
        }
        .content-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            width: 100%;
        }
        .sidebar .brand {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            display: block;
            text-decoration: none;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar li {
            margin-bottom: 10px;
        }
        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .sidebar a:hover {
            background-color: #495057;
            color: white;
        }
        .sidebar a.active {
            background-color: #0d6efd;
            color: white;
        }
        .toggle-btn {
            background-color: transparent;
            color: white;
            border: none !important;
            padding: 10px 15px;
            font-size: 1.5rem;
            cursor: pointer;
            outline: none;
            text-decoration: none !important;
        }
        .toggle-btn:focus {
            outline: none !important;
            box-shadow: none !important;
            border: none !important;
        }
        .toggle-btn:hover {
            text-decoration: none !important;
        }
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 56px;
                height: calc(100vh - 56px);
                z-index: 999;
            }
            .sidebar.collapsed {
                transform: translateX(-100%);
            }
        }
    </style>
</head>
<body>

<!-- Top Navbar -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container-fluid">
        <button class="toggle-btn" id="toggleBtn">☰</button>
        <a class="navbar-brand" href="#">Virtual Notebooks</a>
        <div class="ms-auto">
            <a href="login.html" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<!-- Content Wrapper -->
<div class="content-wrapper">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <a href="#" class="brand">Menu</a>
        <ul>
            <li><a href="#" class="active">Home</a></li>
            <li><a href="#">Notebooks</a></li>
            <li><a href="#">Create New</a></li>
            <li><a href="#">Settings</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h1>Welcome to your Virtual Notebook!</h1>
        <p>Please select a notebook to see your classes.</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const toggleBtn = document.getElementById('toggleBtn');
    const sidebar = document.getElementById('sidebar');

    toggleBtn.addEventListener('click', function() {
        sidebar.classList.toggle('collapsed');
    });
</script>
</body>
</html>
