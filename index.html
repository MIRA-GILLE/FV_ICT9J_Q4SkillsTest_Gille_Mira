<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Skills Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        background-image: url('https://storage.googleapis.com/oa_disk001/obangeles/68/school_logo/1660278047-1310.png');
        background-size: cover;
        background-attachment: fixed;
        background-position: center;
        background-repeat: no-repeat;
        width: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .box {
        width: 700px;
        background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
        padding: 80px;
        border-radius: 20px;
        text-align: center;
        font-family: 'Lucida Sans Unicode', Verdana, sans-serif;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .box h1 {
        color: #0a192f;
        margin-bottom: 10px;
        font-size: 28px;
    }

    .box p {
        color: #666;
        margin-bottom: 30px;
    }

    .box label {
        color: #0a192f;
        font-weight: 600;
        text-align: left;
        display: block;
        margin-bottom: 8px;
    }

    .box input {
        border: 2px solid #ddd !important;
        border-radius: 10px !important;
        padding: 12px 15px !important;
        font-size: 16px !important;
    }

    .box input:focus {
        border-color: #0a192f !important;
        box-shadow: 0 0 10px rgba(10, 25, 47, 0.2) !important;
    }

    .buttons {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 30px;
    }

    .buttons button {
        padding: 12px 30px !important;
        font-size: 16px !important;
        font-weight: 600 !important;
        border-radius: 10px !important;
        border: none !important;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .buttons button:first-child {
        background-color: #0a192f !important;
        color: white !important;
    }

    .buttons button:first-child:hover {
        background-color: #0f2847 !important;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(10, 25, 47, 0.4);
    }

    .buttons button:last-child {
        background-color: #e0e0e0 !important;
        color: #0a192f !important;
    }

    .buttons button:last-child:hover {
        background-color: #d0d0d0 !important;
        transform: translateY(-2px);
    }
</style>
</style>
</head>

<body>

<div class="box">
    <h1 class="fw-bold fs-4">LOG IN AUTHENTICATION FORM</h1>
    <p>Please fill out the following blanks to log in.</p>

    <form id="loginForm" onsubmit="return false;">
        <label>Email Address:</label>
        <input type="email" id="email" class="form-control mb-3" placeholder="Email address...">

        <label>Password:</label>
        <input type="password" id="password" class="form-control mb-3" placeholder="Password...">

        <div id="message" class="text-danger mb-3"></div>

        <div class="form-check d-flex justify-content-center mb-3">
            <input class="form-check-input me-2" type="checkbox" id="checkoutboxID" onclick="checkcheckoutboxID()">
            <label class="form-check-label" for="checkoutboxID">Remember me</label>
        </div>

        <div class="button-group">
            <button type="button" class="btn btn-dark" id="loginBtn" onclick="function_name()">Log In</button>
            <button type="reset" class="btn btn-outline-danger">Clear All</button>
        </div>
    </form>
</div>

<script>
    // Variable for tracking login attempts
    let attempt_counter = 0;

    // start with function
    function function_name(){
        // retrieve input values and message/button elements
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;
        let messageEl = document.getElementById("message");

        do {
            // login credentials//
            if (email === "cruz.vjd@gmail.com" && password === "0192837465") {
                alert("Log in successful! Welcome back, Vivian J. Dela Cruz!");
                attempt_counter = 0; // reset after success
                document.getElementById("message").innerHTML = ""; // clear message
                window.location.href = "/Users/mira/Documents/GitHub/FV_ICT9J_Q4SkillsTest_Gille_Mira/virtualntbks.html"; // go to second page
                break; // stop loop
            } else if (email === "" || password === "") {
                alert("Please fill in all fields.");
                document.getElementById("message").innerHTML = ""; // clear message
                break;
            } else {
                attempt_counter++;
                messageEl.innerHTML = "Incorrect email and/or password. Attempt " + attempt_counter + " of 3";
            }
        } while (false);

        if (attempt_counter >= 3) {
            alert("Too many failed attempts. Login disabled.");
            document.getElementById("loginBtn").disabled = true; // lock button
        }
    }

    function checkcheckoutboxID() {
        let checkbox = document.getElementById("checkoutboxID").checked;

        if (checkbox) {
            alert("By selecting the checkbox, you agree to save your details.");
        }
    }
</script>

</body>
</html>
